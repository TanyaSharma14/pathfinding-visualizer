<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathfinding Visualizer</title>

  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>

<body>
  <div class="container">
    <h1>🎯 Pathfinding Visualizer</h1>
    <p class="subtitle">Click to place Start → End → Walls (click walls again to remove)</p>
    
    <div id="controls">
      <select id="algoSelect">
        <option value="dijkstra">Dijkstra's Algorithm</option>
        <option value="bfs">Breadth-First Search</option>
        <option value="astar">A* Algorithm</option>
      </select>
      <button id="visualizeBtn">▶ Visualize Path</button>
      <button id="resetBtn">🔄 Reset All</button>
      <div class="speed-control">
        <span>Speed:</span>
        <input type="range" id="speed" min="1" max="100" value="50">
      </div>
    </div>
    
    <div id="legend">
      <div class="legend-item">
        <div class="legend-box start"></div>
        <span>Start Node</span>
      </div>
      <div class="legend-item">
        <div class="legend-box end"></div>
        <span>End Node</span>
      </div>
      <div class="legend-item">
        <div class="legend-box wall"></div>
        <span>Wall</span>
      </div>
      <div class="legend-item">
        <div class="legend-box visited"></div>
        <span>Visited</span>
      </div>
      <div class="legend-item">
        <div class="legend-box path"></div>
        <span>Shortest Path</span>
      </div>
    </div>
    
    <div id="grid-container">
      <div id="grid"></div>
    </div>
    
    <div id="stats" class="stats">
      <div class="stat-item">
        <div>Nodes Visited</div>
        <div class="stat-value" id="visitedCount">0</div>
      </div>
      <div class="stat-item">
        <div>Path Length</div>
        <div class="stat-value" id="pathLength">0</div>
      </div>
      <div class="stat-item">
        <div>Time Elapsed</div>
        <div class="stat-value" id="timeElapsed">0ms</div>
      </div>
    </div>
  </div>
</body>
</html>
