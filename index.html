<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathfinding Visualizer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
      color: #f8fafc;
      padding: 20px;
      overflow-x: hidden;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      letter-spacing: -1px;
    }
    
    .subtitle {
      text-align: center;
      font-size: 1rem;
      opacity: 0.8;
      margin-bottom: 25px;
      color: #cbd5e1;
    }
    
    #controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    select, button {
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    select {
      background: rgba(30, 41, 59, 0.8);
      color: #f8fafc;
      border: 2px solid #475569;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }
    
    select:hover {
      border-color: #60a5fa;
      box-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
    }
    
    button {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    #visualizeBtn {
      background: linear-gradient(135deg, #10b981, #06b6d4);
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
    }
    
    #visualizeBtn:hover {
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.6);
    }
    
    #resetBtn {
      background: linear-gradient(135deg, #ef4444, #f97316);
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
    }
    
    #resetBtn:hover {
      box-shadow: 0 8px 25px rgba(239, 68, 68, 0.6);
    }
    
    .speed-control {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(30, 41, 59, 0.6);
      padding: 8px 16px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      border: 2px solid #475569;
    }
    
    input[type="range"] {
      width: 120px;
      height: 6px;
      border-radius: 5px;
      background: #334155;
      outline: none;
      -webkit-appearance: none;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(96, 165, 250, 0.5);
    }
    
    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 10px rgba(96, 165, 250, 0.5);
    }
    
    #legend {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 25px;
      font-size: 14px;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(30, 41, 59, 0.6);
      border-radius: 10px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(71, 85, 105, 0.5);
    }
    
    .legend-box {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    
    #grid-container {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    
    #grid {
      display: grid;
      grid-template-columns: repeat(20, 32px);
      gap: 4px;
      padding: 30px;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 20px;
      box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(71, 85, 105, 0.3);
    }
    
    .node {
      width: 32px;
      height: 32px;
      background: #1e293b;
      border-radius: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border: 2px solid #334155;
      position: relative;
      overflow: hidden;
    }
    
    .node::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    
    .node:hover::before {
      width: 100%;
      height: 100%;
    }
    
    .node:hover {
      transform: scale(1.1);
      border-color: #60a5fa;
      box-shadow: 0 0 15px rgba(96, 165, 250, 0.5);
    }
    
    .start { 
      background: linear-gradient(135deg, #10b981, #059669);
      border-color: #10b981;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    
    .end { 
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border-color: #ef4444;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    
    .wall { 
      background: #0f172a;
      border-color: #1e293b;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
    }
    
    .visited { 
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-color: #3b82f6;
      animation: visitedPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    }
    
    .path {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      border-color: #fbbf24;
      box-shadow: 0 0 25px rgba(251, 191, 36, 0.8);
      animation: pathGlow 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    @keyframes pulse {
      0%, 100% { 
        transform: scale(1);
        opacity: 1;
      }
      50% { 
        transform: scale(1.05);
        opacity: 0.9;
      }
    }
    
    @keyframes visitedPop {
      0% { 
        transform: scale(0.3);
        opacity: 0;
      }
      50% {
        transform: scale(1.2);
      }
      100% { 
        transform: scale(1);
        opacity: 1;
      }
    }
    
    @keyframes pathGlow {
      0% { 
        transform: scale(0.5) rotate(0deg);
        opacity: 0;
      }
      50% {
        transform: scale(1.3) rotate(180deg);
      }
      100% { 
        transform: scale(1) rotate(360deg);
        opacity: 1;
      }
    }
    
    .stats {
      text-align: center;
      margin-top: 20px;
      padding: 15px;
      background: rgba(30, 41, 59, 0.6);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(71, 85, 105, 0.5);
      display: none;
    }
    
    .stats.active {
      display: block;
      animation: slideIn 0.5s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .stat-item {
      display: inline-block;
      margin: 0 15px;
      font-size: 14px;
    }
    
    .stat-value {
      font-weight: 700;
      color: #60a5fa;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 Pathfinding Visualizer</h1>
    <p class="subtitle">Click to place Start → End → Walls (click walls again to remove)</p>
    
    <div id="controls">
      <select id="algoSelect">
        <option value="dijkstra">Dijkstra's Algorithm</option>
        <option value="bfs">Breadth-First Search</option>
        <option value="astar">A* Algorithm</option>
      </select>
      <button id="visualizeBtn">▶ Visualize Path</button>
      <button id="resetBtn">🔄 Reset All</button>
      <div class="speed-control">
        <span>Speed:</span>
        <input type="range" id="speed" min="1" max="100" value="50">
      </div>
    </div>
    
    <div id="legend">
      <div class="legend-item">
        <div class="legend-box start"></div>
        <span>Start Node</span>
      </div>
      <div class="legend-item">
        <div class="legend-box end"></div>
        <span>End Node</span>
      </div>
      <div class="legend-item">
        <div class="legend-box wall"></div>
        <span>Wall</span>
      </div>
      <div class="legend-item">
        <div class="legend-box visited"></div>
        <span>Visited</span>
      </div>
      <div class="legend-item">
        <div class="legend-box path"></div>
        <span>Shortest Path</span>
      </div>
    </div>
    
    <div id="grid-container">
      <div id="grid"></div>
    </div>
    
    <div id="stats" class="stats">
      <div class="stat-item">
        <div>Nodes Visited</div>
        <div class="stat-value" id="visitedCount">0</div>
      </div>
      <div class="stat-item">
        <div>Path Length</div>
        <div class="stat-value" id="pathLength">0</div>
      </div>
      <div class="stat-item">
        <div>Time Elapsed</div>
        <div class="stat-value" id="timeElapsed">0ms</div>
      </div>
    </div>
  </div>

  <script>
    const ROWS = 15;
    const COLS = 20;
    const gridElement = document.getElementById("grid");
    const visualizeBtn = document.getElementById("visualizeBtn");
    const resetBtn = document.getElementById("resetBtn");
    const algoSelect = document.getElementById("algoSelect");
    const speedSlider = document.getElementById("speed");
    const statsElement = document.getElementById("stats");
    const visitedCountElement = document.getElementById("visitedCount");
    const pathLengthElement = document.getElementById("pathLength");
    const timeElapsedElement = document.getElementById("timeElapsed");
    
    let grid = [];
    let startNode = null;
    let endNode = null;
    let placementStage = 0;
    let isRunning = false;
    let visitedNodesCount = 0;
    let startTime = 0;
    
    function createGrid() {
      gridElement.innerHTML = "";
      grid = [];
      for (let r = 0; r < ROWS; r++) {
        const row = [];
        for (let c = 0; c < COLS; c++) {
          const div = document.createElement("div");
          div.classList.add("node");
          div.addEventListener("click", () => handleNodeClick(r, c, div));
          gridElement.appendChild(div);
          row.push({
            row: r,
            col: c,
            distance: Infinity,
            prev: null,
            isWall: false,
            element: div,
            heuristic: 0
          });
        }
        grid.push(row);
      }
    }
    
    function handleNodeClick(r, c, div) {
      if (isRunning) return;
      
      const node = grid[r][c];
      if (placementStage === 0) {
        startNode = node;
        div.classList.add("start");
        placementStage = 1;
      } 
      else if (placementStage === 1) {
        endNode = node;
        div.classList.add("end");
        placementStage = 2;
      } 
      else {
        if (node === startNode || node === endNode) return;
        node.isWall = !node.isWall;
        div.classList.toggle("wall");
      }
    }
    
    function clearPath() {
      visitedNodesCount = 0;
      statsElement.classList.remove("active");
      grid.flat().forEach(n => {
        n.distance = Infinity;
        n.prev = null;
        n.heuristic = 0;
        n.element.classList.remove("visited", "path");
      });
    }
    
    function getNeighbors(node) {
      const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      return dirs
        .map(([dr, dc]) => grid[node.row + dr]?.[node.col + dc])
        .filter(n => n && !n.isWall);
    }
    
    function heuristic(node, end) {
      return Math.abs(node.row - end.row) + Math.abs(node.col - end.col);
    }
    
    async function dijkstra() {
      clearPath();
      startTime = Date.now();
      startNode.distance = 0;
      const unvisited = grid.flat();
      
      while (unvisited.length) {
        unvisited.sort((a, b) => a.distance - b.distance);
        const current = unvisited.shift();
        
        if (current.distance === Infinity) break;
        
        if (current !== startNode && current !== endNode) {
          current.element.classList.add("visited");
          visitedNodesCount++;
        }
        
        await delay();
        
        if (current === endNode) {
          await drawPath(current);
          return;
        }
        
        for (const n of getNeighbors(current)) {
          const dist = current.distance + 1;
          if (dist < n.distance) {
            n.distance = dist;
            n.prev = current;
          }
        }
      }
      showStats(0);
    }
    
    async function bfs() {
      clearPath();
      startTime = Date.now();
      startNode.distance = 0;
      const queue = [startNode];
      
      while (queue.length) {
        const current = queue.shift();
        
        if (current !== startNode && current !== endNode) {
          current.element.classList.add("visited");
          visitedNodesCount++;
        }
        
        await delay();
        
        if (current === endNode) {
          await drawPath(current);
          return;
        }
        
        for (const n of getNeighbors(current)) {
          if (n.distance === Infinity) {
            n.distance = current.distance + 1;
            n.prev = current;
            queue.push(n);
          }
        }
      }
      showStats(0);
    }
    
    async function astar() {
      clearPath();
      startTime = Date.now();
      startNode.distance = 0;
      startNode.heuristic = heuristic(startNode, endNode);
      
      const openSet = [startNode];
      const closedSet = new Set();
      
      while (openSet.length) {
        openSet.sort((a, b) => (a.distance + a.heuristic) - (b.distance + b.heuristic));
        const current = openSet.shift();
        
        if (closedSet.has(current)) continue;
        closedSet.add(current);
        
        if (current !== startNode && current !== endNode) {
          current.element.classList.add("visited");
          visitedNodesCount++;
        }
        
        await delay();
        
        if (current === endNode) {
          await drawPath(current);
          return;
        }
        
        for (const n of getNeighbors(current)) {
          if (closedSet.has(n)) continue;
          
          const tentativeDistance = current.distance + 1;
          if (tentativeDistance < n.distance) {
            n.distance = tentativeDistance;
            n.heuristic = heuristic(n, endNode);
            n.prev = current;
            if (!openSet.includes(n)) {
              openSet.push(n);
            }
          }
        }
      }
      showStats(0);
    }
    
    async function drawPath(node) {
      const path = [];
      let cur = node.prev;
      
      while (cur && cur !== startNode) {
        path.push(cur);
        cur = cur.prev;
      }
      
      for (const n of path) {
        n.element.classList.add("path");
        await delay();
      }
      
      showStats(path.length);
    }
    
    function showStats(pathLen) {
      const timeElapsed = Date.now() - startTime;
      visitedCountElement.textContent = visitedNodesCount;
      pathLengthElement.textContent = pathLen;
      timeElapsedElement.textContent = timeElapsed + "ms";
      statsElement.classList.add("active");
    }
    
    function delay() {
      const speed = 101 - speedSlider.value;
      return new Promise(res => setTimeout(res, speed));
    }
    
    function resetAll() {
      if (isRunning) return;
      startNode = null;
      endNode = null;
      placementStage = 0;
      createGrid();
      statsElement.classList.remove("active");
    }
    
    visualizeBtn.onclick = async () => {
      if (!startNode || !endNode) {
        alert("⚠️ Please place Start and End nodes first!");
        return;
      }
      
      if (isRunning) return;
      
      isRunning = true;
      visualizeBtn.disabled = true;
      
      const algo = algoSelect.value;
      if (algo === "bfs") await bfs();
      else if (algo === "astar") await astar();
      else await dijkstra();
      
      isRunning = false;
      visualizeBtn.disabled = false;
    };
    
    resetBtn.onclick = resetAll;
    createGrid();
  </script>
</body>
</html>
